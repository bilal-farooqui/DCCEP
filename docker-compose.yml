# =============================================================
#  Distributed E-Commerce Platform – Docker Compose (Cloud MongoDB Atlas)
#  Custom bridge network: ecommerce-network
#  Services connect directly to MongoDB Atlas Cloud Database
# =============================================================

networks:
  ecommerce-network:
    driver: bridge
    name: ecommerce-network

services:

  # ── User Service ───────────────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    restart: unless-stopped
    env_file:
      - ./user-service/.env
    environment:
      NODE_ENV: production
    ports:
      - "5001:5001"
    networks:
      - ecommerce-network

  # ── Product Service ────────────────────────────────────────
  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    restart: unless-stopped
    env_file:
      - ./product-service/.env
    environment:
      NODE_ENV: production
    ports:
      - "5002:5002"
    networks:
      - ecommerce-network

  # ── Order Service ──────────────────────────────────────────
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    restart: unless-stopped
    env_file:
      - ./order-service/.env
    environment:
      PRODUCT_SERVICE_URL: http://product-service:5002
      PAYMENT_SERVICE_URL: http://payment-service:5004
      NODE_ENV: production
    ports:
      - "5003:5003"
    networks:
      - ecommerce-network
    depends_on:
      - product-service
      - payment-service

  # ── Payment Service ────────────────────────────────────────
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    restart: unless-stopped
    env_file:
      - ./payment-service/.env
    environment:
      NODE_ENV: production
    ports:
      - "5004:5004"
    networks:
      - ecommerce-network

  # ── API Gateway ────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    environment:
      PORT: 5000
      USER_SERVICE_URL: http://user-service:5001
      PRODUCT_SERVICE_URL: http://product-service:5002
      ORDER_SERVICE_URL: http://order-service:5003
      PAYMENT_SERVICE_URL: http://payment-service:5004
      NODE_ENV: production
    ports:
      - "5000:5000"   # Exposed to host – entry point for all traffic
    networks:
      - ecommerce-network
    depends_on:
      - user-service
      - product-service
      - order-service
      - payment-service
