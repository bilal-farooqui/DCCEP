# =============================================================
#  Distributed E-Commerce Platform – Docker Compose
#  Custom bridge network: ecommerce-network
#  Isolated MongoDB per service (data separation guaranteed)
#  Inter-service URLs use Docker DNS (no localhost)
# =============================================================

# ─── Named Volumes (persistent data) ─────────────────────────
volumes:
  user_db_data:
  product_db_data:
  order_db_data:
  payment_db_data:

# ─── Custom Bridge Network ────────────────────────────────────
networks:
  ecommerce-network:
    driver: bridge
    name: ecommerce-network

# ─── Services ─────────────────────────────────────────────────
services:

  # ── MongoDB: User Service ──────────────────────────────────
  mongo-user:
    image: mongo:7.0
    container_name: mongo-user
    restart: unless-stopped
    volumes:
      - user_db_data:/data/db
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB: Product Service ───────────────────────────────
  mongo-product:
    image: mongo:7.0
    container_name: mongo-product
    restart: unless-stopped
    volumes:
      - product_db_data:/data/db
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB: Order Service ─────────────────────────────────
  mongo-order:
    image: mongo:7.0
    container_name: mongo-order
    restart: unless-stopped
    volumes:
      - order_db_data:/data/db
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB: Payment Service ───────────────────────────────
  mongo-payment:
    image: mongo:7.0
    container_name: mongo-payment
    restart: unless-stopped
    volumes:
      - payment_db_data:/data/db
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── User Service ───────────────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    restart: unless-stopped
    environment:
      PORT: 5001
      MONGODB_URI: mongodb://mongo-user:27017/user_service_db
      NODE_ENV: production
    ports:
      - "5001:5001"
    networks:
      - ecommerce-network
    depends_on:
      mongo-user:
        condition: service_healthy

  # ── Product Service ────────────────────────────────────────
  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    restart: unless-stopped
    environment:
      PORT: 5002
      MONGODB_URI: mongodb://mongo-product:27017/product_service_db
      NODE_ENV: production
    ports:
      - "5002:5002"
    networks:
      - ecommerce-network
    depends_on:
      mongo-product:
        condition: service_healthy

  # ── Order Service ──────────────────────────────────────────
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    restart: unless-stopped
    environment:
      PORT: 5003
      MONGODB_URI: mongodb://mongo-order:27017/order_service_db
      # Docker service discovery replaces localhost
      PRODUCT_SERVICE_URL: http://product-service:5002
      PAYMENT_SERVICE_URL: http://payment-service:5004
      NODE_ENV: production
    ports:
      - "5003:5003"
    networks:
      - ecommerce-network
    depends_on:
      mongo-order:
        condition: service_healthy
      product-service:
        condition: service_started
      payment-service:
        condition: service_started

  # ── Payment Service ────────────────────────────────────────
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    restart: unless-stopped
    environment:
      PORT: 5004
      MONGODB_URI: mongodb://mongo-payment:27017/payment_service_db
      NODE_ENV: production
    ports:
      - "5004:5004"
    networks:
      - ecommerce-network
    depends_on:
      mongo-payment:
        condition: service_healthy

  # ── API Gateway ────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    environment:
      PORT: 5000
      # Docker internal DNS – no more localhost!
      USER_SERVICE_URL: http://user-service:5001
      PRODUCT_SERVICE_URL: http://product-service:5002
      ORDER_SERVICE_URL: http://order-service:5003
      PAYMENT_SERVICE_URL: http://payment-service:5004
      NODE_ENV: production
    ports:
      - "5000:5000"   # Exposed to host – entry point for all traffic
    networks:
      - ecommerce-network
    depends_on:
      - user-service
      - product-service
      - order-service
      - payment-service
